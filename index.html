<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>The Factory Ledger</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://unpkg.com/lucide@latest"></script>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Space+Mono:wght@400;700&display=swap"
            rel="stylesheet">
      <link rel="stylesheet" href="/factory-events2/styles.css">
</head>

<body class="bg-[#f9f7f2] text-[#1a1a1a] max-w-6xl mx-auto p-6 md:p-16">

      <header class="border-b-4 border-black pb-6 mb-4">
            <!-- Row 1: Title + Search + Buttons -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                  <div>
                        <h1 class="text-4xl md:text-5xl font-bold tracking-tighter uppercase italic leading-none">The Factory</h1>
                        <p class="text-[10px] font-mono pl-2 uppercase tracking-[0.1em] text-gray-500 mt-2">at Franklin, TN | Events Ledger 2026</p>
                  </div>
                  <div class="flex items-end gap-3 w-full md:w-auto">
                        <!-- Search inline with buttons -->
                        <div class="relative flex-1 md:w-56">
                              <div class="relative">
                                    <input type="text" id="search-input" oninput="handleSearch()" placeholder="Search..."
                                          autocomplete="off" spellcheck="false" class="factory-input pl-6 py-2 italic">
                                    <div class="absolute left-0 top-3 flex items-center text-gray-400" pr-2><i data-lucide="search" class="w-4 h-4"></i></div>
                              </div>
                        </div>
                        <button type="button" onclick="openModalForCreate()"
                              class="flex-none bg-black text-white px-6 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-red-800 transition-colors whitespace-nowrap">+ New Event</button>
                        <button type="button" onclick="openSettings()" title="Settings / Archive"
                              class="flex-none border-2 border-black px-4 py-3 text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-colors flex items-center gap-2">
                              <i data-lucide="settings" class="w-3 h-3"></i>
                        </button>
                  </div>
            </div>

      </header>

      <!-- Month Filter Bar below header line -->
      <div class="mt-4 overflow-x-auto">
            <div id="month-filter-bar" class="flex gap-1 justify-center min-w-max mx-auto"></div>
      </div>

      <div id="event-container" class="grid grid-cols-1 gap-0 border-t border-black mt-4"></div>

      <div id="event-modal"
            class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
            <div
                  class="bg-[#f9f7f2] border-4 md:border-8 border-black p-6 md:p-12 max-w-2xl w-full shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] overflow-y-auto max-h-[90vh]">
                  <h2 id="modal-title"
                        class="text-3xl md:text-4xl font-bold uppercase italic mb-8 border-b-2 border-black pb-4">Log
                        Entry</h2>
                  <input type="hidden" id="modal-id">

                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                        <div class="md:col-span-2">
                              <label class="factory-label">Event Designation</label>
                              <input type="text" id="modal-name" autocomplete="off" placeholder="Event Name or Title" class="factory-input text-xl md:text-2xl font-bold uppercase">
                        </div>

                        <div>
                              <label class="factory-label">Category</label>
                              <select id="modal-category" class="factory-input font-mono text-xs uppercase">
                                    <option value="CORP">Corporate</option>
                                    <option value="PRIV">Private</option>
                                    <option value="PUBL">Public</option>
                                    <option value="LAB">Lab / Internal</option>
                              </select>
                        </div>
                        <div>
                              <label class="factory-label">Operational Status</label>
                              <select id="modal-status" class="factory-input font-mono text-xs uppercase">
                                    <option value="DRAFT">Drafting</option>
                                    <option value="CONFIRMED">Confirmed</option>
                                    <option value="LIVE">Live / In-Progress</option>
                                    <option value="COMPLETE">Completed</option>
                              </select>
                        </div>

                        <div>
                              <label class="factory-label">Operational Date</label>
                              <input type="date" id="modal-date" class="factory-input" placeholder="YYYY-MM-DD">
                        </div>
                        <div>
                              <label class="factory-label">Series Configuration</label>
                              <select id="modal-repeat" class="factory-input font-mono text-xs uppercase">
                                    <option value="NONE">Single Entry</option>
                                    <option value="WEEKLY">Weekly Routine</option>
                                    <option value="MONTHLY">Monthly Batch</option>
                                    <option value="ANNUAL">Annual Cycle</option>
                              </select>
                        </div>

                        <div>
                              <label class="factory-label">Start Time</label>
                              <div class="flex items-center gap-1 border-b-2 border-gray-100">
                                    <select id="start-h" class="time-select"></select>
                                    <span class="font-bold">:</span>
                                    <select id="start-m" class="time-select">
                                          <option value="00">00</option>
                                          <option value="15">15</option>
                                          <option value="30">30</option>
                                          <option value="45">45</option>
                                    </select>
                                    <select id="start-ap" class="time-select font-bold" alt="start meridiem">
                                          <option value="AM">AM</option>
                                          <option value="PM">PM</option>
                                    </select>
                              </div>
                        </div>
                        <div>
                              <label class="factory-label">End Time</label>
                              <div class="flex items-center gap-1 border-b-2 border-gray-100">
                                    <select id="end-h" class="time-select"></select></select>
                                    <span class="font-bold">:</span>
                                    <select id="end-m" class="time-select">
                                          <option value="00">00</option>
                                          <option value="15">15</option>
                                          <option value="30">30</option>
                                          <option value="45">45</option>
                                    </select>
                                    <select id="end-ap" class="time-select font-bold">
                                          <option value="AM">AM</option>
                                          <option value="PM">PM</option>
                                    </select>
                              </div>
                        </div>

                        <div class="md:col-span-2">
                              <label class="factory-label">Site Location</label>
                              <input type="text" id="modal-loc" autocomplete="off" class="factory-input" placeholder="Physical location or virtual platform">
                        </div>

                        <div class="md:col-span-2">
                              <label class="factory-label">Technical Specs (Load-in List)</label>
                              <textarea id="modal-specs"
                                    class="factory-input h-20 font-mono text-xs p-2 bg-gray-50 border-2"
                                    placeholder="Power, A/V, and catering requirements..."></textarea>
                        </div>

                        <div>
                              <label class="factory-label">Liaison Name</label>
                              <input type="text" id="modal-contact" autocomplete="off" class="factory-input" placeholder="First Last">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                              <div>
                                    <label class="factory-label">Phone</label>
                                    <input type="tel" id="modal-phone" placeholder="000-000-0000"
                                          class="factory-input font-mono text-xs">
                              </div>
                              <div>
                                    <label class="factory-label">Email</label>
                                    <input type="email" id="modal-email" placeholder="liaison@email.com"
                                          class="factory-input font-mono text-xs">
                              </div>
                        </div>

                        <div class="md:col-span-2">
                              <label class="factory-label">Reference Image (URL)</label>
                              <input type="text" id="modal-img" autocomplete="off" class="factory-input" placeholder="Image URL for internal reference only">
                        </div>
                  </div>

                  <div class="flex flex-col md:flex-row gap-4 mt-10">
                        <button onclick="handleSave()"
                              class="bg-black text-white px-10 py-5 text-xs font-bold uppercase tracking-widest flex-1 order-2 md:order-1">Authorize
                              Entry</button>
                        <button onclick="closeModal()"
                              class="border-2 border-black px-10 py-5 text-xs font-bold uppercase tracking-widest flex-1 order-1 md:order-2">Discard</button>
                  </div>
            </div>
      </div>

      <div id="delete-modal"
            class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-[60] p-4 backdrop-blur-md">
            <div class="bg-[#f9f7f2] border-4 border-red-800 p-8 max-w-md w-full">
                  <h2 class="text-2xl font-bold uppercase italic mb-4 text-red-800">Warning</h2>
                  <p class="font-mono text-[10px] uppercase mb-2">Confirm permanent termination?</p>
                  <input type="hidden" id="delete-id-storage">

                  <!-- Series delete controls — shown only for recurring events -->
                  <div id="delete-series-controls" class="hidden border border-red-200 bg-red-50 p-4 mb-6 mt-4">
                        <p class="font-mono text-[10px] uppercase text-red-800 mb-4">
                              This entry is part of a recurring series
                              (<span id="delete-series-count">0</span> total entries).
                              Delete just this one, or terminate the entire series?
                        </p>
                        <div class="flex gap-3">
                              <button type="button" onclick="executeFinalDelete()"
                                    class="border-2 border-red-800 text-red-800 px-4 py-3 text-[9px] font-bold uppercase tracking-widest flex-1 hover:bg-red-800 hover:text-white transition-colors">This Entry Only</button>
                              <button type="button" onclick="executeSeriesDelete()"
                                    class="bg-red-800 text-white px-4 py-3 text-[9px] font-bold uppercase tracking-widest flex-1">Entire Series</button>
                        </div>
                  </div>

                  <!-- Single-entry delete -->
                  <div id="delete-single-controls" class="flex gap-4 mt-4">
                        <button onclick="executeFinalDelete()"
                              class="bg-red-800 text-white px-6 py-4 text-[10px] font-bold uppercase tracking-widest flex-1">Terminate</button>
                        <button onclick="closeDeleteModal()"
                              class="border-2 border-black px-6 py-4 text-[10px] font-bold uppercase tracking-widest flex-1">Cancel</button>
                  </div>
            </div>
      </div>

      <!-- SETTINGS / ARCHIVE MODAL -->
      <div id="settings-modal"
            class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
            <div class="bg-[#f9f7f2] border-4 md:border-8 border-black p-6 md:p-10 max-w-xl w-full shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] overflow-y-auto max-h-[85vh]">
                  <div class="flex items-center justify-between border-b-2 border-black pb-4 mb-6">
                        <h2 class="text-3xl font-bold uppercase italic">Settings</h2>
                        <button type="button" onclick="closeSettings()" title="Close" class="text-gray-400 hover:text-black transition-colors">
                              <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                  </div>

                  <div>
                        <h3 class="text-[10px] font-mono font-bold uppercase tracking-widest text-gray-500 mb-3">Archived Entries</h3>
                        <div id="archive-list"></div>
                  </div>
            </div>
      </div>

      <script src="/factory-events2/scripts.js"></script>
</body>

</html>
